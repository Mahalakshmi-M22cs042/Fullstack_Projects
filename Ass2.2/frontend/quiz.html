<!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      width: 60%;
      margin: auto;
      margin-top: 30px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      text-align: left;
    }

    button {
      padding: 12px 25px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .progress {
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      margin: 20px 0;
    }

    .progress-bar {
      height: 100%;
      background: green;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<script type="text/babel" src="quiz.js"></script>

</body>
</html>
